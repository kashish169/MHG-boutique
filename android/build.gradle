ext.kotlin_version = '2.3.0'

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.buildDir = '../build'
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(':app')
}
subprojects { subproject ->
    subproject.plugins.withId("com.android.library") {
        subproject.android.buildFeatures.buildConfig = true
        if (subproject.android.namespace == null || subproject.android.namespace.isEmpty()) {
            def manifest = subproject.file("src/main/AndroidManifest.xml")
            if (manifest.exists()) {
                def packageName = new XmlParser().parse(manifest).attribute("package")
                if (packageName) {
                    subproject.android.namespace = packageName
                }
            }
        }
    }
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
